name: Build & Test

on:
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: |
          echo 'DEVELOPMENT_TEAM = ' > Local.xcconfig
          xcodegen generate

      - name: Build
        run: xcodebuild -scheme Utterd -destination 'platform=macOS' build

      - name: Test
        run: xcodebuild -scheme Utterd -destination 'platform=macOS' test -skip-testing:UtterdTests/AppleScriptNotesServiceIntegrationTests
